services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tg
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: tainted_grail
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "tg", "-d", "tainted_grail"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  server:
    container_name: tainted-grail-server
    build: ./server
    environment:
      DATABASE_URL: postgresql://tg:${DB_PASSWORD}@db:5432/tainted_grail
      NO_AUTH: "1"
      PORT: "3000"
      BOT_TOKEN: dummy
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  nginx:
    container_name: tainted-grail-nginx
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8443:8443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
