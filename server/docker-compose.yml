services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tg
      POSTGRES_PASSWORD: tg_dev_password
      POSTGRES_DB: tainted_grail
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata:
